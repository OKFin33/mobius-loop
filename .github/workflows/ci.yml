name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 tools/public_readiness_check.py
      - run: python3 -m py_compile tools/*.py
      - run: python3 -m unittest discover -s tests

